name: Playwright Tests

permissions:
  contents: write

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}
    
    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        ENV: demo
    
    
    - name: Debug Allure results after tests (Linux/macOS)
      if: always() && runner.os != 'Windows'
      shell: bash
      run: |
        echo "PWD=$(pwd)"
        echo "Playwright version:"
        npx playwright --version || true
        echo "List reports folder:"
        ls -la reports || true
        echo "List reports/allure-results folder:"
        ls -la reports/allure-results || true

    - name: Debug Allure results after tests (Windows)
      if: always() && runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "PWD=$(Get-Location)"
        echo "Playwright version:"
        npx playwright --version

        echo "List reports folder:"
        if (Test-Path "reports") { Get-ChildItem "reports" | Format-List } else { echo "reports/ does not exist" }

        echo "List reports/allure-results folder:"
        if (Test-Path "reports/allure-results") { Get-ChildItem "reports/allure-results" | Format-List } else { echo "reports/allure-results does not exist" }

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
        path: reports/
        retention-days: 30
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots-${{ matrix.os }}-${{ matrix.browser }}
        path: screenshots/
        retention-days: 7
    
    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline
        allure generate reports/allure-results -o reports/allure-report --clean
    
    - name: Publish Allure Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report-${{ matrix.os }}-${{ matrix.browser }}
        path: reports/allure-report/
        retention-days: 30

  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-reports
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./all-reports
        keep_files: true
